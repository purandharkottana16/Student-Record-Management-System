<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #ff758c, #ff7eb3);
        }
        .card {
            margin-top: 80px;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center">
    <div class="card col-md-5">

        <h2 class="text-center mb-4">➕ Add Student</h2>

        <form method="POST">
            <input type="text" name="name" class="form-control mb-3" placeholder="Enter Name" required>

            <input type="number" name="roll" class="form-control mb-3" placeholder="Enter Roll Number" required>

            <input type="text" name="course" class="form-control mb-3" placeholder="Enter Course" required>

            <button class="btn btn-primary w-100">Add Student</button>
        </form>

        <a href="/" class="btn btn-secondary mt-3">⬅ Back</a>

    </div>
</div>

</body>
</html>
