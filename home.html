<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
        }
        .container {
            margin-top: 50px;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        table {
            background: white;
            color: black;
            border-radius: 10px;
            overflow: hidden;
        }
        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card p-4">

        <h2 class="text-center mb-4">📚 Student Records</h2>

        <div class="text-center mb-3">
            <a href="/add" class="btn btn-success">➕ Add Student</a>
        </div>

        <table class="table table-striped text-center">
            <tr>
                <th>Name</th>
                <th>Roll</th>
                <th>Course</th>
                <th>Action</th>
            </tr>

            {% for s in students %}
            <tr>
                <td>{{ s.name }}</td>
                <td>{{ s.roll }}</td>
                <td>{{ s.course }}</td>
                <td>
                    <a href="/delete/{{ loop.index0 }}" class="btn btn-danger btn-sm">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </table>

    </div>
</div>

</body>
</html>
